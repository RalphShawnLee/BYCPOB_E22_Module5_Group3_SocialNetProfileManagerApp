<!doctype html>
<html lang="en" data-bs-theme="light" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SocialNet Manager</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />

    <!-- Bootstrap 5.3 CSS via CDN -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />

    <!-- Custom styles (must come AFTER Bootstrap CDN) -->
    <link rel="stylesheet" th:href="@{/css/style.css}" href="css/style.css" />

    <!--
      NOTE: no Supabase JS client here. The browser only ever talks to
      this server's own /api/profiles/* endpoints -- Postgres access
      happens server-side via Spring Data JPA, and Supabase Storage
      uploads happen server-side too (via the service_role key, which
      never reaches the browser).
    -->
  </head>
  <body>

    <!-- ===== APPLICATION TITLE HEADER ===== -->
    <header id="app-header">
      <h1 id="app-title">LBYCPOB SocialNet - Profile Manager</h1>
    </header>

    <!-- ===== MAIN THREE-COLUMN LAYOUT ===== -->
    <div id="app-wrapper">
      <main id="main-content" class="container-fluid flex-grow-1 py-3 px-3">
        <div class="row g-3 h-100">

          <!-- ===== LEFT PANEL: Profile Management ===== -->
          <div class="col-12 col-md-3">
            <div class="sn-panel h-100">
              <h6 class="panel-heading">Profile Management</h6>

              <p class="field-label">Add/Lookup Profile:</p>

              <input type="text" id="input-name" class="form-control sn-input mb-2"
                     placeholder="Enter profile name" />

              <div class="btn-row mb-3">
                <button id="btn-add"    class="btn sn-btn-blue">Add</button>
                <button id="btn-lookup" class="btn sn-btn-blue">Lookup</button>
                <button id="btn-delete" class="btn sn-btn-red">Delete</button>
              </div>

              <p class="field-label">All Profiles:</p>
              <div id="profile-list" class="profile-list-box">
                <!-- Populated dynamically by app.js via GET /api/profiles -->
              </div>
            </div>
          </div>

          <!-- ===== CENTER PANEL: Profile Information ===== -->
          <div class="col-12 col-md-5">
            <div class="sn-panel sn-panel--bordered h-100">
              <h6 class="panel-heading">Profile Information</h6>

              <div class="profile-hero mb-1">
                <img id="profile-pic"
                     src="https://6fkrqtkwbcnqsois.public.blob.vercel-storage.com/avatars/default.webp"
                     alt="Profile picture"
                     class="profile-thumb" />
                <h4 id="profile-name" class="profile-hero-name">No Profile Selected</h4>
              </div>

              <hr class="sn-divider" />

              <p class="field-label">Current Status:</p>
              <div id="profile-status" class="sn-textbox mb-3">&mdash;</div>

              <p class="field-label">Favorite Quote:</p>
              <div id="profile-quote" class="sn-textbox mb-3">&mdash;</div>

              <p class="field-label">Friends:</p>
              <div id="friends-list" class="sn-textbox sn-textbox--tall"></div>
            </div>
          </div>

          <!-- ===== RIGHT PANEL: Edit Profile ===== -->
          <div class="col-12 col-md-4">
            <div class="sn-panel right-panel h-100">
              <h6 class="panel-heading">Edit Profile</h6>

              <!-- Change Status -->
              <p class="field-label">Change Status:</p>
              <input type="text" id="input-status" class="form-control sn-input mb-1"
